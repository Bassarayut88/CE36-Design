<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Calc Tool - Fine Tune</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #2980b9; --success-color: #27ae60; --fail-color: #c0392b; --bg-color: #ecf0f1; --paper-color: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px 0; color: #333; font-size: 14px; }
        .container { width: 210mm; min-height: 297mm; background-color: var(--paper-color); margin: 0 auto; padding: 15mm; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; }
        .controls { position: fixed; top: 20px; right: 20px; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; width: 180px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 100; }
        .controls button { background: var(--success-color); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: 600; width: 100%; margin-top: 10px; }
        .header { border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { margin: 0; font-size: 22px; color: var(--primary-color); }
        .top-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .beam-visual { flex: 0 0 180px; height: 260px; border: 1px solid #ddd; background: #fafafa; position: relative; display: flex; justify-content: center; align-items: center; }
        .beam-rect { width: 100px; height: 160px; border: 2px solid #333; background: #fff; position: relative; }
        .stirrup-rect { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 2px dashed #999; border-radius: 4px; }
        .rebar { width: 12px; height: 12px; background: #000; border-radius: 50%; position: absolute; transform: translateX(-50%); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .section-title { font-weight: 700; color: var(--primary-color); background: #e8f6f3; padding: 5px 10px; border-left: 4px solid var(--accent-color); margin: 10px 0 5px 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 15px; background: #f8f9fa; padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px; }
        .input-item { display: flex; justify-content: space-between; align-items: center; }
        .input-item label { font-size: 12px; white-space: nowrap; }
        .input-item input, .input-item select { border: 1px solid #ccc; padding: 2px 5px; text-align: right; width: 80px; font-family: 'Sarabun'; font-weight: bold; color: #0056b3; }
        
        .qty-input { width: 50px !important; margin-right: 5px; text-align: center !important; }

        .calc-detail { font-family: 'Sarabun', sans-serif; font-size: 13px; line-height: 1.6; }
        .calc-row { margin-bottom: 4px; padding-left: 10px; }
        .sub-row { margin-left: 20px; color: #444; }
        .result-box { border: 1px solid #ccc; padding: 10px; margin-top: 10px; background: #fff; }
        .status-pass { color: var(--success-color); font-weight: bold; }
        .status-fail { color: var(--fail-color); font-weight: bold; }

        @media print {
            .controls { display: none; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; margin: 0; padding: 10px 25px; width: 100%; }
            .input-item input, .input-item select { border: none; background: none; font-weight: bold; padding: 0; appearance: none; color: black; }
        }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="window.print()">พิมพ์รายงาน</button>
</div>

<div class="container">
    <div class="header">
        <div>
            <h1>รายการคำนวณออกแบบคาน คสล.</h1>
            <div style="font-size:12px; color:#555;">วิธี SDM (Strength Design Method)</div>
        </div>
        <div style="text-align:right; font-size:12px;">วันที่: <span id="dateDisplay"></span></div>
    </div>

    <div class="top-section">
        <div class="beam-visual">
            <div class="beam-rect">
                <div class="stirrup-rect" id="visual-stirrup"></div>
                <div id="visual-bars"></div>
            </div>
        </div>

        <div style="flex:1;">
            <div class="section-title">1. ข้อมูลการออกแบบ (Input Data)</div>
            <div class="input-grid">
                <!-- แถวที่ 1 -->
                <div class="input-item"><label>คอนกรีต fc' (ksc)</label><input type="number" id="fc" value="150" onchange="calc()"></div>
                <div class="input-item"><label>กว้าง B (cm)</label><input type="number" id="b" value="20" onchange="calc()"></div>
                
                <!-- แถวที่ 2 -->
                <div class="input-item"><label>Fy เหล็กแกน (ksc)</label><input type="number" id="fy" value="4000" onchange="calc()"></div>
                <div class="input-item"><label>ลึก H (cm)</label><input type="number" id="h" value="40" onchange="calc()"></div>
                
                <!-- แถวที่ 3 -->
                <div class="input-item"><label style="color:blue;">Fy เหล็กปลอก (ksc)</label><input type="number" id="fy_st" value="2400" style="color:blue;" onchange="calc()"></div>
                <div class="input-item"><label>ระยะหุ้ม (cm)</label><input type="number" id="cover" value="2.5" onchange="calc()"></div>
                
                <!-- แถวที่ 4 -->
                <div class="input-item"><label style="color:red; font-weight:bold;">Mu (t-m)</label><input type="number" id="mu" value="4" style="color:red;" onchange="calc()"></div>
                <div class="input-item"><label>Vu (ton)</label><input type="number" id="vu" value="6.5" onchange="calc()"></div> 
                
                <!-- แถวที่ 5 -->
                <div class="input-item"><label>Tu (t-m)</label><input type="number" id="tu" value="0" onchange="calc()"></div>
                <div></div> <!-- ช่องว่างจัดหน้า -->
            </div>

            <div class="section-title">2. เลือกเหล็กเสริม (Reinforcement)</div>
            <div class="input-grid" style="grid-template-columns: 1fr;">
                <div class="input-item">
                    <label>เหล็กบน (Top):</label>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="number" id="top_n" class="qty-input" value="2" min="2" step="1" onchange="calc()">
                        <span>เส้น</span>
                        <select id="top_dia" onchange="calc()">
                            <option value="10">DB10</option>
                            <option value="12" selected>DB12</option>
                            <option value="16">DB16</option>
                            <option value="20">DB20</option>
                            <option value="25">DB25</option>
                            <option value="28">DB28</option>
                            <option value="32">DB32</option>
                        </select>
                    </div>
                </div>
                <div class="input-item">
                    <label>เหล็กล่าง (Bot):</label>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="number" id="bot_n" class="qty-input" value="3" min="2" step="1" onchange="calc()">
                        <span>เส้น</span>
                        <select id="bot_dia" onchange="calc()">
                            <option value="10">DB10</option>
                            <option value="12" selected>DB12</option>
                            <option value="16">DB16</option>
                            <option value="20">DB20</option>
                            <option value="25">DB25</option>
                            <option value="28">DB28</option>
                            <option value="32">DB32</option>
                        </select>
                    </div>
                </div>
                <div class="input-item">
                    <label>เหล็กปลอก (Stirrup):</label>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <div style="position:relative;">
                             <input type="number" id="st_n" class="qty-input" value="1" min="1" step="1" onchange="calc()" style="width:50px !important;">
                        </div>
                        <span style="margin-right:5px;">ชุด</span>

                        <select id="st_dia" onchange="calc()">
                            <option value="6" selected>RB6</option>
                            <option value="9">RB9</option>
                            <option value="10">DB10</option>
                            <option value="12">DB12</option>
                        </select>
                        <span>@</span><input type="number" id="st_space" value="15" style="width:40px; text-align:center;" onchange="calc()"> cm
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-title">3. รายการคำนวณละเอียด (Detailed Calculation)</div>
    <div class="calc-detail" id="calc_content"></div>

    <div style="display:flex; justify-content:flex-end; margin-top:50px; border-top:1px solid #eee; padding-top:20px;">
        <div style="text-align:center; width:260px;">
            <div style="border-bottom:1px solid #000; height:30px; margin-bottom:5px;"></div>
            <b>วิศวกรผู้ออกแบบ</b>
        </div>
    </div>
</div>

<script>
    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('th-TH');

    function getArea(dia) {
        if(dia==6) return 0.283; 
        if(dia==9) return 0.636;
        if(dia==10) return 0.785;
        if(dia==12) return 1.131; 
        if(dia==16) return 2.011;
        if(dia==20) return 3.142; 
        if(dia==25) return 4.909; 
        if(dia==28) return 6.158;
        if(dia==32) return 8.042;
        return 0;
    }
    function fmt(n) { return n.toLocaleString('en-US', {minimumFractionDigits: 3, maximumFractionDigits: 3}); }

    function drawBars(topN, botN, stLegs) {
        let box = document.getElementById('visual-bars'); box.innerHTML = '';
        let stBox = document.getElementById('visual-stirrup'); stBox.innerHTML = '';

        if(topN < 1) topN = 1; 
        if(botN < 1) botN = 1;

        // วาดเหล็กปลอกขาด้านใน (Inner legs)
        if(stLegs > 2) {
            let extra = stLegs - 2;
            for(let i=1; i<=extra; i++) {
                let leg = document.createElement('div');
                leg.style.position = 'absolute';
                leg.style.top = '0';
                leg.style.bottom = '0';
                leg.style.width = '0';
                leg.style.borderLeft = '2px dashed #999';
                let pct = (i / (extra + 1)) * 100;
                leg.style.left = pct + '%';
                stBox.appendChild(leg);
            }
        }

        // วาดเหล็กแกนบน
        for(let i=0; i<topN; i++) {
            let el = document.createElement('div'); el.className='rebar'; el.style.top='12px';
            let leftPos = (topN==1) ? 50 : 12 + i*((100-24)/(topN-1));
            el.style.left = leftPos + 'px'; 
            box.appendChild(el);
        }
        // วาดเหล็กแกนล่าง
        for(let i=0; i<botN; i++) {
            let el = document.createElement('div'); el.className='rebar'; el.style.bottom='12px';
            let leftPos = (botN==1) ? 50 : 12 + i*((100-24)/(botN-1));
            el.style.left = leftPos + 'px'; 
            box.appendChild(el);
        }
    }

    function calc() {
        let fc = parseFloat(document.getElementById('fc').value);
        let fy = parseFloat(document.getElementById('fy').value);
        let fy_st = parseFloat(document.getElementById('fy_st').value);
        
        let b = parseFloat(document.getElementById('b').value);
        let h = parseFloat(document.getElementById('h').value);
        let cover = parseFloat(document.getElementById('cover').value);
        let Mu = parseFloat(document.getElementById('mu').value);
        let Vu = parseFloat(document.getElementById('vu').value);
        let Tu = parseFloat(document.getElementById('tu').value) * 100000; 

        let top_n = parseInt(document.getElementById('top_n').value);
        let top_dia = parseInt(document.getElementById('top_dia').value);
        let bot_n = parseInt(document.getElementById('bot_n').value);
        let bot_dia = parseInt(document.getElementById('bot_dia').value);
        
        // รับค่าจำนวนชุดเหล็กปลอก (ให้เป็นจำนวนเต็ม 1, 2, 3... โดย 1 ชุด = 2 ขา)
        let st_sets = parseInt(document.getElementById('st_n').value);
        if(isNaN(st_sets) || st_sets < 1) st_sets = 1;
        let st_legs = st_sets * 2;

        let st_dia = parseInt(document.getElementById('st_dia').value);
        let s = parseFloat(document.getElementById('st_space').value);

        // --- กำหนดค่า Phi ---
        let phi_b = 0.90; // Flexure
        let phi_v = 0.85; // Shear
        let phi_t = 0.75; // Torsion

        // กำหนด Fy สำหรับบิด ให้ใช้ Fy เหล็กแกน
        let fy_st_tor = fy; 

        drawBars(top_n, bot_n, st_legs);

        // Prep Formulas modified accurately based on notes
        let As = bot_n * getArea(bot_dia);     
        let As_prime = top_n * getArea(top_dia); 
        // d' = ระยะหุ้ม + ไดอะมิเตอร์ปลอก + (ไดอะมิเตอร์เหล็กแกน/2)
        let d_prime = cover + (st_dia/10) + (top_dia/10)/2; 
        // d = ความลึกรวม - ระยะหุ้ม - ไดอะมิเตอร์ปลอก - (ไดอะมิเตอร์เหล็กแกน/2)
        let d = h - (cover + (st_dia/10) + (bot_dia/10)/2); 
        
        let beta1 = (fc <= 280) ? 0.85 : Math.max(0.65, 0.85 - 0.05*(fc-280)/70);

        // 3.1 Flexure
        let A_q = 0.85 * fc * beta1 * b;
        let B_q = (As_prime * 6120) - (As * fy); 
        let C_q = - (As_prime * 6120 * d_prime);
        let c_val = (-B_q + Math.sqrt(B_q*B_q - 4*A_q*C_q)) / (2*A_q);
        let a_val = beta1 * c_val;
        let fs_prime = 6120 * (c_val - d_prime) / c_val;
        let comp_status = (fs_prime > fy) ? "(Yield)" : "(Not Yield)";
        if(fs_prime > fy) fs_prime = fy; 

        let Mn_kgcm = 0.85*fc*a_val*b*(d - a_val/2) + As_prime*fs_prime*(d - d_prime);
        let Mn_tm = Mn_kgcm / 100000;
        let phiMn = phi_b * Mn_tm;

        let html = "";
        html += `<div class="calc-row"><b>3.1 ออกแบบการดัด (Flexure Design) [Φ=${phi_b}]:</b></div>`;
        html += `<div class="sub-row">d = ${fmt(d)} cm, d' = ${fmt(d_prime)} cm, As = ${fmt(As)} cm²</div>`;
        html += `<div class="sub-row">c = ${fmt(c_val)} cm, a = ${fmt(a_val)} cm, f's = ${fmt(fs_prime)} ksc ${comp_status}</div>`;
        
        html += `<div class="sub-row" style="color:#2980b9; font-size:12px; margin-top:5px;">Mn = [ 0.85fc a b (d - a/2) + As' f's (d - d') ] / 10⁵</div>`;
        html += `<div class="sub-row" style="color:#2980b9; font-size:12px;">Mn = [ 0.85(${fc})(${fmt(a_val)})(${b})(${fmt(d)} - ${fmt(a_val/2)}) + (${fmt(As_prime)})(${fmt(fs_prime)})(${fmt(d)} - ${fmt(d_prime)}) ] / 10⁵ = ${fmt(Mn_tm)} t-m</div>`;

        let m_status = (phiMn >= Mu) ? "<span class='status-pass'>OK (ผ่าน)</span>" : "<span class='status-fail'>NG (ไม่ผ่าน)</span>";
        html += `<div class="result-box"><b>ΦMn = ${phi_b} × ${fmt(Mn_tm)} = ${fmt(phiMn)} t-m</b> vs <b>Mu = ${fmt(Mu)} t-m</b> ... ${m_status}</div>`;

        // 3.2 Shear
        let Vc = 0.53 * Math.sqrt(fc) * b * d; 
        
        // คำนวณ Av รวมตามจำนวนขา
        let Area_Stirrup = getArea(st_dia);
        let Av = st_legs * Area_Stirrup; 

        let Vs_prov = (Av * fy_st * d) / s; 
        
        let Limit_Vs_Req = 1.1 * Math.sqrt(fc) * b * d; 
        let phiVn = phi_v * (Vc + Vs_prov) / 1000; 
        
        let Vs_Req_Actual = (Vu * 1000 / phi_v) - Vc;
        if(Vs_Req_Actual < 0) Vs_Req_Actual = 0;
        
        let Av_s_req = Vs_Req_Actual / (fy_st * d);

        html += `<div class="calc-row" style="margin-top:15px;"><b>3.2 ออกแบบการเฉือน (Shear Design) [Φ=${phi_v}]:</b></div>`;
        
        html += `<div class="sub-row" style="color:#2980b9; font-size:12px; margin-top:5px;">Vc = 0.53 √fc b d = 0.53 × √${fc} × ${b} × ${fmt(d)} = ${fmt(Vc)} kg</div>`;
        html += `<div class="sub-row">กำลังเฉือนคอนกรีต Vc = ${fmt(Vc/1000)} ton</div>`;
        
        html += `<div class="sub-row" style="color:#2980b9; font-size:12px; margin-top:5px;">Vs = (Av fyt d) / s = (${fmt(Av)} × ${fy_st} × ${fmt(d)}) / ${s} = ${fmt(Vs_prov)} kg</div>`;
        html += `<div class="sub-row">กำลังเฉือนเหล็กปลอก (${st_sets} ชุด = ${st_legs} ขา RB${st_dia}@${s} cm., Av=${fmt(Av)}) Vs = ${fmt(Vs_prov/1000)} ton</div>`;

        let v_status = "";
        if (phiVn < Vu) v_status = "<span class='status-fail'>NG (รับแรงไม่พอ)</span>";
        else v_status = (Vs_Req_Actual > Limit_Vs_Req) ? "<span class='status-fail'>NG (เกินพิกัดหน้าตัด)</span>" : "<span class='status-pass'>OK</span>";
        
        html += `<div class="result-box"><b>ΦVn = ${phi_v} × (${fmt(Vc/1000)} + ${fmt(Vs_prov/1000)}) = ${fmt(phiVn)} ton</b> vs <b>Vu = ${fmt(Vu)} ton</b> ... ${v_status}<br></div>`;

        // 3.3 Torsion
        html += `<div class="calc-row" style="margin-top:15px;"><b>3.3 ออกแบบการบิด (Torsion Design) [Φ=${phi_t}]:</b></div>`;
        if(Tu > 0) {
            let x1 = b - 2*(cover + st_dia/10/2); 
            let y1 = h - 2*(cover + st_dia/10/2);
            let Aoh = x1 * y1; 
            let Ao = 0.85 * Aoh;
            let Tn = Tu / phi_t; 
            
            let At_s_req = Tn / (2 * Ao * fy_st_tor); 

            let Total_Req = Av_s_req + 2*At_s_req;
            let Prov_Stirrup = Av / s;

            html += `<div class="sub-row">Tu = ${fmt(Tu/100000)} t-m (ใช้ Fy=${fy_st_tor} สำหรับบิด)</div>`;
            html += `<div class="sub-row">เหล็กรับเฉือน Av/s = ${fmt(Av_s_req)} cm²/cm</div>`;
            html += `<div class="sub-row">เหล็กรับบิด 2At/s = ${fmt(2*At_s_req)} cm²/cm (At/s=${fmt(At_s_req)})</div>`;
            html += `<div class="sub-row"><b>รวมต้องการ (Av+2At)/s = ${fmt(Total_Req)} cm²/cm</b></div>`;
            
            let t_status = (Prov_Stirrup >= Total_Req) ? "<span class='status-pass'>OK</span>" : "<span class='status-fail'>NG (เพิ่มเหล็กปลอก)</span>";
            
            // เพิ่ม "cm." ตามหมายเหตุ
            html += `<div class="result-box">ใช้ ${st_sets} ชุด (${st_legs} ขา) RB${st_dia}@${s} cm. (Av/s = ${fmt(Prov_Stirrup)}) ... ${t_status}</div>`;
        } else {
            html += `<div class="sub-row">ไม่มีแรงบิดกระทำ (Tu = 0)</div>`;
        }

        document.getElementById('calc_content').innerHTML = html;
    }
    calc();
</script>

</body>
</html>
